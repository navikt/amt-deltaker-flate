<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMT Deltaker Flate - Demo Apps</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem;
        background: #fff;
        color: #111;
      }
      h1 {
        margin: 0 0 1.5rem;
        font-size: 1.5rem;
      }
      .app-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 0.75rem;
      }
      .app-card {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 1rem;
      }
      .app-card h2 {
        margin: 0;
        font-size: 1.1rem;
      }
      .app-card p {
        margin: 0.5rem 0 0;
        color: #444;
        font-size: 0.95rem;
      }
      .app-link {
        display: inline-block;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>AMT Deltaker Flate</h1>
    <div class="app-list">
      <!-- APP_CARDS_PLACEHOLDER -->
    </div>
  </body>
</html>

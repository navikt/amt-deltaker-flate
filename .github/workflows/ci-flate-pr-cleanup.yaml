name: Rydd applikasjon for PR

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/**
      - .github/workflows/*-flate-*.yaml
    types:
      - closed
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      innbyggers-flate: ${{ steps.filter.outputs['innbyggers-flate'] }}
      nav-veileders-flate: ${{ steps.filter.outputs['nav-veileders-flate'] }}
      tiltakskoordinator-flate: ${{ steps.filter.outputs['tiltakskoordinator-flate'] }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            innbyggers-flate:
              - apps/innbyggers-flate/**
              - .github/workflows/innbyggers-flate-*.yaml
            nav-veileders-flate:
              - apps/nav-veileders-flate/**
              - .github/workflows/nav-veileders-flate-*.yaml
            tiltakskoordinator-flate:
              - apps/tiltakskoordinator-flate/**
              - .github/workflows/tiltakskoordinator-flate-*.yaml

  cleanup-pr-flate:
    needs: changes
    name: Rydd applikasjon for PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Used to authenticate with Google Cloud
    strategy:
      matrix:
        app:
          - name: innbyggers-flate
            gs-path: 'gs://amt-deltaker-innbyggers-flate-dev'
          - name: nav-veileders-flate
            gs-path: 'gs://amt-deltaker-flate-dev-v2'
          - name: tiltakskoordinator-flate
            gs-path: 'gs://amt-tiltakskoordinator-flate-dev-pr'

    steps:
      - name: Set SHOULD_RUN environment variable
        env:
          CHANGES_OUTPUT: ${{ needs.changes.outputs[matrix.app.name] }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          PR_USER: ${{ github.event.pull_request.user.login }}
        run: |
          echo "SHOULD_RUN=false" >> $GITHUB_ENV
          if [ "$CHANGES_OUTPUT" = "true" ] && \
             [ "$IS_FORK" != "true" ] && \
             [ "$PR_USER" != "dependabot[bot]" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        if: env.SHOULD_RUN == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/696882554390/locations/global/workloadIdentityPools/github/providers/github-action
          service_account: amt-deltaker-flate-gcs@amt-dev-d98f.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        if: env.SHOULD_RUN == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Delete files on GCS
        if: env.SHOULD_RUN == 'true'
        run: gsutil rm -r "${{ matrix.app.gs-path }}/pr-${{ github.event.number }}"

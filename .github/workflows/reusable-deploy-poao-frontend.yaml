name: Reusable Deploy NAIS poao-frontend
on:
  workflow_call:
    inputs:
      module_path:
        required: true
        type: string

      prod_deploy_enabled:
        required: false
        type: boolean
        default: true

      targets:
        required: false
        type: string
        default: '["dev","prod"]'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    name: Deploy poao-frontend ${{ matrix.target }} - ${{ inputs.module_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy application
        if: |
          matrix.target == 'dev' ||
          (matrix.target == 'demo' && github.ref == 'refs/heads/main') ||
          (matrix.target == 'prod' && github.ref == 'refs/heads/main' && inputs.prod_deploy_enabled == true)
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: ${{ matrix.target == 'prod' && 'prod-gcp' || 'dev-gcp' }}
          RESOURCE: apps/${{ inputs.module_path }}/nais/nais-${{ matrix.target }}.yaml
          PRINT_PAYLOAD: true
